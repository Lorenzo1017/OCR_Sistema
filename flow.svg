<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 300" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <rect x="0" y="0" width="940" height="300" rx="16" fill="#ffffff"/>
  <rect x="0.5" y="0.5" width="939" height="299" rx="16" fill="none" stroke="#e1e4e8"/>

  <text x="470" y="40" text-anchor="middle" font-size="20" font-weight="700" fill="#24292f">OCR_Sistema — 100% local, offline</text>

  <!-- inbox -->
  <g>
    <rect x="30" y="80" width="150" height="130" rx="12" fill="#f6f8fa" stroke="#d0d7de"/>
    <text x="105" y="112" text-anchor="middle" font-size="30">📥</text>
    <text x="105" y="146" text-anchor="middle" font-size="15" font-weight="700" fill="#24292f">inbox/</text>
    <text x="105" y="170" text-anchor="middle" font-size="12" fill="#57606a">scansioni</text>
    <text x="105" y="188" text-anchor="middle" font-size="12" fill="#57606a">(PDF / immagini)</text>
  </g>

  <!-- OCR -->
  <g>
    <rect x="240" y="95" width="150" height="100" rx="12" fill="#ddf4ff" stroke="#54aeff"/>
    <text x="315" y="132" text-anchor="middle" font-size="15" font-weight="700" fill="#0969da">OCR</text>
    <text x="315" y="156" text-anchor="middle" font-size="12" fill="#0969da">Tesseract</text>
    <text x="315" y="174" text-anchor="middle" font-size="12" fill="#0969da">+ OCRmyPDF</text>
  </g>

  <!-- LLM -->
  <g>
    <rect x="450" y="95" width="150" height="100" rx="12" fill="#fbefff" stroke="#c297ff"/>
    <text x="525" y="132" text-anchor="middle" font-size="15" font-weight="700" fill="#8250df">LLM locale</text>
    <text x="525" y="156" text-anchor="middle" font-size="12" fill="#8250df">Ollama</text>
    <text x="525" y="174" text-anchor="middle" font-size="12" fill="#8250df">+ Qwen2.5</text>
  </g>

  <!-- rename -->
  <g>
    <rect x="660" y="95" width="120" height="100" rx="12" fill="#fff8c5" stroke="#d4a72c"/>
    <text x="720" y="130" text-anchor="middle" font-size="22">🏷️</text>
    <text x="720" y="158" text-anchor="middle" font-size="12" font-weight="700" fill="#7d4e00">rinomina</text>
    <text x="720" y="176" text-anchor="middle" font-size="11" fill="#7d4e00">data+contenuto</text>
  </g>

  <!-- archivio -->
  <g>
    <rect x="820" y="80" width="100" height="130" rx="12" fill="#dafbe1" stroke="#4ac26b"/>
    <text x="870" y="116" text-anchor="middle" font-size="30">📂</text>
    <text x="870" y="150" text-anchor="middle" font-size="14" font-weight="700" fill="#1a7f37">archivio/</text>
    <text x="870" y="172" text-anchor="middle" font-size="11" fill="#1a7f37">ordinato</text>
    <text x="870" y="188" text-anchor="middle" font-size="11" fill="#1a7f37">per tema</text>
  </g>

  <!-- arrows -->
  <g stroke="#8c959f" stroke-width="2.5" fill="none" marker-end="url(#a)">
    <path d="M184 145 H236"/>
    <path d="M394 145 H446"/>
    <path d="M604 145 H656"/>
    <path d="M784 145 H816"/>
  </g>
  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L9 4.5 L0 9 z" fill="#8c959f"/>
    </marker>
  </defs>

  <!-- example -->
  <text x="470" y="252" text-anchor="middle" font-size="13" fill="#57606a">esempio:</text>
  <text x="470" y="274" text-anchor="middle" font-size="14" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" fill="#24292f">archivio/Casa/Utenze/Gas/2024-03-15_Enel_bolletta_gas.pdf</text>
</svg>
